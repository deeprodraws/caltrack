<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0f1117"/>
  <rect width="512" height="512" rx="112" fill="#6c63ff" opacity="0.95"/>
  <!-- Progress ring -->
  <circle cx="256" cy="220" r="110" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="24"/>
  <circle cx="256" cy="220" r="110" fill="none" stroke="white" stroke-width="24"
    stroke-dasharray="483" stroke-dashoffset="120"
    stroke-linecap="round" transform="rotate(-90 256 220)"/>
  <!-- CT monogram -->
  <text x="256" y="248" font-family="system-ui,-apple-system,sans-serif"
    font-size="108" font-weight="800" fill="white"
    text-anchor="middle" dominant-baseline="middle">CT</text>
  <!-- Tagline -->
  <text x="256" y="390" font-family="system-ui,-apple-system,sans-serif"
    font-size="48" font-weight="500" fill="rgba(255,255,255,0.7)"
    text-anchor="middle">CalTrack</text>
