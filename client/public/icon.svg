<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Purple background -->
  <rect width="512" height="512" rx="100" fill="#6432FF"/>

  <!-- C-road: dark thick arc opening to the right (~270 degrees) -->
  <path d="M 380 132 A 175 175 0 1 0 380 380"
    stroke="#1a1228" stroke-width="84" fill="none"
    stroke-linecap="round"/>

  <!-- White dashed lane markers along the C -->
  <path d="M 380 132 A 175 175 0 1 0 380 380"
    stroke="white" stroke-width="13" fill="none"
    stroke-linecap="butt" stroke-dasharray="28 22"
    stroke-dashoffset="14" opacity="0.9"/>
</svg>
